name: Discord Notify

on:
  workflow_call:
    inputs:
      status:
        required: true
        type: string
      actor:
        required: true
        type: string
      commit_message:
        required: true
        type: string
      run_url:
        required: true
        type: string
    secrets:
      DISCORD_WEBHOOK:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Notification
        run: |
          if [ "${{ inputs.status }}" == "success" ]; then
            TITLE="✅ Deployment Successful"
            DESCRIPTION="**Ro International Admin Panel** successfully deployed!"
            COLOR=3066993
          else
            TITLE="❌ Deployment Failed"
            DESCRIPTION="**Ro International Admin Panel** deployment failed!"
            COLOR=15158332
          fi

          COMMIT_MSG=$(echo ${{ inputs.commit_message }} | tr -d '\n\r' | sed 's/"/\\"/g')

          curl -H "Content-Type: application/json" \
          -d "{
            \"embeds\": [{
              \"title\": \"$TITLE\",
              \"description\": \"$DESCRIPTION\",
              \"color\": $COLOR,
              \"fields\": [
                {\"name\": \"📦 Repository\", \"value\": \"${{ github.repository }}\", \"inline\": false},
                {\"name\": \"Branch\", \"value\": \"main\", \"inline\": true},
                {\"name\": \"Triggered by\", \"value\": \"${{ inputs.actor }}\", \"inline\": true},
                {\"name\": \"Commit\", \"value\": \"$COMMIT_MSG\", \"inline\": false},
                {\"name\": \"🔍 View Logs\", \"value\": \"[Click here](${{ inputs.run_url }})\", \"inline\": false}
              ]
            }]
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}
